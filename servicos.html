<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - Wangsheng Funeral Parlor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="wangsheng-container">
        <header>
            <h1>📜 Nossos Serviços</h1>
            <p>O descanso eterno com a elegância que você merece.</p>
        </header>

        <section class="services-list">
            <div class="service-card" style="border: 1px solid var(--hu-gold); padding: 15px; margin-bottom: 20px; border-radius: 10px;">
                <h3>Pacote "Adeus Liyue"</h3>
                <img src="https://img.cdndsgni.com/preview/12415059.jpg" alt="Caixão de Cedro" style="width:100%; border-radius: 8px; margin-bottom: 10px;">
                <p>Cedro de primeira qualidade. Leve um, ganhe o do seu vizinho!</p>
                <span class="price" style="color: var(--hu-gold); font-weight: bold;">200,000 Mora</span>
            </div>

            <a href="index.html" class="btn-submit" style="display: block; text-align: center; text-decoration: none; margin-top: 20px;">Voltar para a Funerária</a>
        </section>
    </main>
