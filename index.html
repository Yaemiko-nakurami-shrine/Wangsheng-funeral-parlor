<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wangsheng Funeral Parlor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="wangsheng-container">
        <header>
            <div class="logo-hu">👻</div>
            <h1>Wangsheng Funeral Parlor</h1>
            <p>"Transferência imediata para o outro mundo... com desconto!"</p>
        </header>

        <section class="booking-section">
            <h2>📜 Contrato de Descanso</h2>
            <form id="wangsheng-form" action="https://formspree.io/f/mreyzdow" method="POST">
                <div class="input-group">
                    <label>Nome do "Candidato":</label>
                    <input type="text" name="nome_cliente" id="client-name" placeholder="Ex: Baizhu" required>
                </div>
                
                <div class="input-group">
                    <label>Tipo de Madeira:</label>
                    <select name="madeira" id="wood-type">
                        <option value="cedro">Cedro de Qingce</option>
                        <option value="seda">Seda de Liyue (Luxo)</option>
                        <option value="caixa">Caixa de Papelão (Econômico)</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Assinar com Sangue... ou Tinta! 🖋️</button>
            </form>
        </section>

        <div class="coupon-box">
            <button id="get-coupon">Tentar a Sorte! 🧧</button>
            <p id="coupon-text"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html><div class="service-card" onclick="addMora(200000)">
    <div class="tag">Mais Vendido</div>
    <img url="https://img.cdndsgni.com/preview/12415059.jpg" alt="Caixão de Cedro" class="service-img">
    
    <h3>Pacote "Adeus Liyue"</h3>
    <p>Serviço completo. Compre um agora...</p>
    <span class="price">200,000 Mora</span>
</div>
